<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Forget Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            max-width: 400px;
        }

        .form-container {
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }
        /* Your existing styles */

    body {
        margin: 10px; /* Adjust margin for smaller screens */
    }

    }

    .form-container {

    }
}

</head>
<body>
    <div class="container">
        <h2 class="text-center">Forget Password</h2>

        <div class="form-container">
            <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
            </div>

            <button class="btn btn-primary" onclick="sendOTP()">Send OTP</button>
        </div>

        <div id="otpContainer" class="form-container hidden">
            <div class="mb-3">
                <label for="otp" class="form-label">Enter OTP:</label>
                <input type="text" class="form-control" id="otp" placeholder="Enter OTP">
            </div>

            <button class="btn btn-primary" onclick="submitOTP()">Submit OTP</button>
        </div>

        <div id="newPasswordContainer" class="form-container hidden">
            <div class="mb-3">
                <label for="newPassword" class="form-label">New Password:</label>
                <input type="password" class="form-control" id="newPassword" placeholder="Enter new password">
            </div>

            <div class="mb-3">
                <label for="confirmNewPassword" class="form-label">Confirm New Password:</label>
                <input type="password" class="form-control" id="confirmNewPassword" placeholder="Confirm new password">
            </div>

            <button class="btn btn-primary" onclick="submitNewPassword()">Submit New Password</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function sendOTP() {
            const email = document.getElementById('email').value;
            // Perform logic to send OTP to the user's email
            // For simplicity, we'll just show the OTP input field
            document.getElementById('otpContainer').classList.remove('hidden');
        }

        function submitOTP() {
            // Perform validation of OTP
            // For simplicity, we'll just show the new password input fields
            document.getElementById('otpContainer').classList.add('hidden');
            document.getElementById('newPasswordContainer').classList.remove('hidden');
        }

        function submitNewPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;
            // Perform logic to update the password
            // For simplicity, we'll just log the new password to the console
            console.log('New Password:', newPassword);
        }
    </script>
</body>
</html>
